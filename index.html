<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>할리갈리 멀티플레이어</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: manipulation;
            user-select: none;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            overflow: hidden;
            margin: 0;
        }
        .card-slot {
            aspect-ratio: 2/3;
            width: 75px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2);
        }
        .deck-active {
            cursor: pointer;
            transition: transform 0.1s;
            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
        }
        .deck-active:active {
            transform: scale(0.95);
        }
        .bell-btn {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #facc15 0%, #ca8a04 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 5px 0 #854d0e;
            cursor: pointer;
            transition: all 0.05s;
        }
        .bell-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #854d0e;
        }
        
        .p-area { position: absolute; display: flex; align-items: center; transition: opacity 0.5s; }
        #area-0 { bottom: 30px; left: 50%; transform: translateX(-50%); flex-direction: column; }
        #area-1 { top: 30px; left: 50%; transform: translateX(-50%) rotate(180deg); flex-direction: column; }
        #area-2 { left: 30px; top: 50%; transform: translateY(-50%) rotate(90deg); flex-direction: column; }
        #area-3 { right: 30px; top: 50%; transform: translateY(-50%) rotate(-90deg); flex-direction: column; }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            padding: 15px 40px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 1.2rem;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .fruit-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
        }

        .shake {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>

        <p class="text-zinc-500 mb-8 font-medium">과일이 5개가 되면 종을 치세요!</p>
