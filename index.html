<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>할리갈리 멀티플레이어</title>
<script src="https://www.google.com/search?q=https://cdn.tailwindcss.com"></script>
<style>
body {
touch-action: manipulation;
user-select: none;
background-color: #1a1a1a;
color: white;
font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
overflow: hidden;
margin: 0;
}
.card-slot {
aspect-ratio: 2/3;
width: 75px;
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
position: relative;
box-shadow: 0 4px 10px rgba(0,0,0,0.5);
border: 2px solid rgba(255,255,255,0.2);
}
.deck-active {
cursor: pointer;
transition: transform 0.1s;
background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
}
.deck-active:active {
transform: scale(0.95);
}
.bell-btn {
width: 60px;
height: 60px;
background: radial-gradient(circle, #facc15 0%, #ca8a04 100%);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 24px;
box-shadow: 0 5px 0 #854d0e;
cursor: pointer;
transition: all 0.05s;
}
.bell-btn:active {
transform: translateY(3px);
box-shadow: 0 2px 0 #854d0e;
}

    .p-area { position: absolute; display: flex; align-items: center; transition: opacity 0.5s; }
    #area-0 { bottom: 30px; left: 50%; transform: translateX(-50%); flex-direction: column; }
    #area-1 { top: 30px; left: 50%; transform: translateX(-50%) rotate(180deg); flex-direction: column; }
    #area-2 { left: 30px; top: 50%; transform: translateY(-50%) rotate(90deg); flex-direction: column; }
    #area-3 { right: 30px; top: 50%; transform: translateY(-50%) rotate(-90deg); flex-direction: column; }

    .toast {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.95);
        color: #000;
        padding: 15px 40px;
        border-radius: 40px;
        font-weight: 900;
        font-size: 1.2rem;
        z-index: 1000;
        display: none;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .fruit-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 4px;
    }

    .shake {
        animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes shake {
        10%, 90% { transform: translate3d(-1px, 0, 0); }
        20%, 80% { transform: translate3d(2px, 0, 0); }
        30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        40%, 60% { transform: translate3d(4px, 0, 0); }
    }
</style>


</head>
<body class="h-screen w-screen relative bg-zinc-900">

<div id="setup-screen" class="fixed inset-0 bg-zinc-950 z-50 flex flex-col items-center justify-center p-6">
    <h1 class="text-6xl font-black text-yellow-500 mb-2 tracking-tighter">HALLI GALLI</h1>
    <p class="text-zinc-500 mb-12 font-medium">과일이 5개가 되면 종을 치세요!</p>
    
    <div class="w-full max-w-sm space-y-8">
        <div>
            <p class="text-zinc-400 text-xs font-bold uppercase mb-3 text-center tracking-widest">게임 모드</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="setMode('ai')" id="mode-ai" class="py-4 rounded-2xl border-2 border-yellow-500 bg-zinc-900 font-bold transition-all">사람 vs AI</button>
                <button onclick="setMode('human')" id="mode-human" class="py-4 rounded-2xl border-2 border-transparent bg-zinc-900 font-bold transition-all">사람끼리</button>
            </div>
        </div>

        <div>
            <p class="text-zinc-400 text-xs font-bold uppercase mb-3 text-center tracking-widest">인원수</p>
            <div class="flex justify-between gap-2">
                <button onclick="setCount(2)" id="cnt-2" class="flex-1 py-4 rounded-2xl border-2 border-yellow-500 bg-zinc-900 font-bold">2인</button>
                <button onclick="setCount(3)" id="cnt-3" class="flex-1 py-4 rounded-2xl border-2 border-transparent bg-zinc-900 font-bold">3인</button>
                <button onclick="setCount(4)" id="cnt-4" class="flex-1 py-4 rounded-2xl border-2 border-transparent bg-zinc-900 font-bold">4인</button>
            </div>
        </div>

        <div id="diff-section">
            <p class="text-zinc-400 text-xs font-bold uppercase mb-3 text-center tracking-widest">AI 난이도</p>
            <div class="flex justify-between gap-2">
                <button onclick="setDiff('easy')" id="diff-easy" class="flex-1 py-3 rounded-xl border-2 border-yellow-500 bg-zinc-900 text-sm font-bold">쉬움</button>
                <button onclick="setDiff('normal')" id="diff-normal" class="flex-1 py-3 rounded-xl border-2 border-transparent bg-zinc-900 text-sm font-bold">보통</button>
                <button onclick="setDiff('hard')" id="diff-hard" class="flex-1 py-3 rounded-xl border-2 border-transparent bg-zinc-900 text-sm font-bold">어려움</button>
            </div>
        </div>

        <button onclick="startGame()" class="w-full py-5 bg-yellow-500 text-zinc-950 font-black text-2xl rounded-2xl shadow-[0_8px_0_rgb(161,98,7)] active:translate-y-1 active:shadow-none transition-all mt-6">시작하기</button>
    </div>
</div>

<div id="ingame-controls" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col gap-3 z-10 hidden items-center">
    <div class="flex flex-col gap-2 p-4 bg-black/30 backdrop-blur-md rounded-3xl border border-white/10 scale-75 md:scale-100">
        <button onclick="restartGame()" class="px-6 py-3 bg-zinc-100 text-zinc-900 rounded-xl font-black text-sm uppercase tracking-tighter hover:bg-white active:scale-95 transition-all">다시 시작</button>
        <button onclick="exitToMenu()" class="px-6 py-3 bg-red-600 text-white rounded-xl font-black text-sm uppercase tracking-tighter hover:bg-red-500 active:scale-95 transition-all">게임 종료</button>
    </div>
</div>

<div id="game-board" class="w-full h-full hidden relative overflow-hidden">
    <div id="players-container"></div>
</div>

<template id="player-template">
    <div class="p-area">
        <div class="name-label text-xs font-black text-white/40 mb-3 tracking-widest">PLAYER 1</div>
        <div class="flex items-center gap-4">
            <div class="deck-btn card-slot">
                <span class="count-label text-xl font-black italic">0</span>
            </div>
            <div class="open-slot card-slot bg-white invisible">
                <div class="fruit-grid"></div>
            </div>
            <div class="bell-btn" onclick="handleBellPress(this)">🔔</div>
        </div>
    </div>
</template>

<div id="toast" class="toast"></div>

<div id="win-screen" class="fixed inset-0 bg-black/95 z-[100] hidden flex flex-col items-center justify-center p-8 text-center animate-in fade-in zoom-in duration-300">
    <div class="text-yellow-500 text-xl font-black tracking-[0.3em] mb-2 uppercase">Champion Found</div>
    <h1 id="winner-name" class="text-7xl font-black mb-12 text-white">PLAYER 1</h1>
    <div class="flex flex-col w-full max-w-xs gap-4">
        <button onclick="restartGame()" class="w-full py-5 bg-white text-zinc-950 font-black text-xl rounded-2xl active:scale-95 transition-all">한 판 더!</button>
        <button onclick="exitToMenu()" class="w-full py-5 bg-zinc-800 text-white font-black text-xl rounded-2xl active:scale-95 transition-all">메인 메뉴</button>
    </div>
</div>

<script>
    let currentMode = 'ai';
    let playerCount = 2;
    let aiLevel = 'easy';
    
    let state = {
        active: false,
        turnIdx: 0,
        players: [],
        aiBellTimer: null
    };

    const fruitIcons = ['🍓', '🍌', '🍋', '🍇'];
    const aiSpeeds = { 'easy': [1800, 3500], 'normal': [900, 1800], 'hard': [400, 900] };

    function setMode(m) {
        currentMode = m;
        document.getElementById('mode-ai').className = `py-4 rounded-2xl border-2 font-bold transition-all ${m === 'ai' ? 'border-yellow-500 bg-zinc-900' : 'border-transparent bg-zinc-900'}`;
        document.getElementById('mode-human').className = `py-4 rounded-2xl border-2 font-bold transition-all ${m === 'human' ? 'border-yellow-500 bg-zinc-900' : 'border-transparent bg-zinc-900'}`;
        
        const diffSec = document.getElementById('diff-section');
        diffSec.style.opacity = m === 'ai' ? '1' : '0.2';
        diffSec.style.pointerEvents = m === 'ai' ? 'auto' : 'none';
    }

    function setCount(n) {
        playerCount = n;
        [2, 3, 4].forEach(num => {
            const btn = document.getElementById('cnt-' + num);
            btn.className = `flex-1 py-4 rounded-2xl border-2 font-bold ${num === n ? 'border-yellow-500 bg-zinc-900' : 'border-transparent bg-zinc-900'}`;
        });
    }

    function setDiff(d) {
        aiLevel = d;
        ['easy', 'normal', 'hard'].forEach(lev => {
            const btn = document.getElementById('diff-' + lev);
            btn.className = `flex-1 py-3 rounded-xl border-2 text-sm font-bold ${lev === d ? 'border-yellow-500 bg-zinc-900' : 'border-transparent bg-zinc-900'}`;
        });
    }

    function exitToMenu() {
        location.reload();
    }

    function restartGame() {
        document.getElementById('win-screen').classList.add('hidden');
        startGame();
    }

    function startGame() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-board').classList.remove('hidden');
        document.getElementById('ingame-controls').classList.remove('hidden');
        
        const container = document.getElementById('players-container');
        container.innerHTML = "";
        state.players = [];
        state.active = true;
        state.turnIdx = 0;
        if (state.aiBellTimer) clearTimeout(state.aiBellTimer);

        let deck = [];
        fruitIcons.forEach(icon => {
            [5, 3, 3, 2, 1].forEach((qty, n) => {
                for(let i=0; i<qty; i++) deck.push({ fruit: icon, count: n + 1 });
            });
        });
        deck = deck.sort(() => Math.random() - 0.5);

        const template = document.getElementById('player-template');
        for(let i=0; i<playerCount; i++) {
            const clone = template.content.cloneNode(true);
            const area = clone.querySelector('.p-area');
            area.id = `area-${i}`;
            
            const isAI = currentMode === 'ai' && i > 0;
            area.querySelector('.name-label').innerText = isAI ? `AI ${i}` : `PLAYER ${i+1}`;
            
            const player = {
                id: i,
                isAI: isAI,
                deck: [],
                openCards: [],
                active: true,
                el: area
            };

            const deckBtn = area.querySelector('.deck-btn');
            if (!isAI) {
                deckBtn.classList.add('deck-active');
                deckBtn.onclick = () => handleFlip(i);
            }

            state.players.push(player);
            container.appendChild(clone);
        }

        let targetP = 0;
        while(deck.length > 0) {
            state.players[targetP % playerCount].deck.push(deck.pop());
            targetP++;
        }

        updateView();
        nextTurn();
    }

    function updateView() {
        state.players.forEach((p, idx) => {
            const countLabel = p.el.querySelector('.count-label');
            countLabel.innerText = p.deck.length;
            
            const openSlot = p.el.querySelector('.open-slot');
            const grid = openSlot.querySelector('.fruit-grid');
            
            if (p.openCards.length > 0) {
                openSlot.classList.remove('invisible');
                const top = p.openCards[p.openCards.length - 1];
                grid.innerHTML = "";
                for(let k=0; k<top.count; k++) {
                    const s = document.createElement('span');
                    s.innerText = top.fruit;
                    s.className = "text-2xl leading-none select-none";
                    grid.appendChild(s);
                }
            } else {
                openSlot.classList.add('invisible');
            }

            p.el.style.opacity = p.active ? "1" : "0.15";
            p.el.style.pointerEvents = p.active ? "auto" : "none";
        });
    }

    function nextTurn() {
        if (!state.active) return;

        let count = 0;
        while(!state.players[state.turnIdx].active && count < playerCount) {
            state.turnIdx = (state.turnIdx + 1) % playerCount;
            count++;
        }

        const p = state.players[state.turnIdx];
        if (p.isAI) {
            setTimeout(() => handleFlip(p.id), 1000);
        }
    }

    function handleFlip(pIdx) {
        if (!state.active || state.turnIdx !== pIdx) return;
        
        const p = state.players[pIdx];
        if (p.deck.length > 0) {
            p.openCards.push(p.deck.pop());
            state.turnIdx = (state.turnIdx + 1) % playerCount;
            updateView();
            checkBellOpportunity();
            checkGameOver();
            nextTurn();
        }
    }

    function checkBellOpportunity() {
        if (state.aiBellTimer) clearTimeout(state.aiBellTimer);
        
        if (isBellConditionMet()) {
            const speed = aiSpeeds[aiLevel];
            const delay = Math.random() * (speed[1] - speed[0]) + speed[0];
            
            state.aiBellTimer = setTimeout(() => {
                const activeAIs = state.players.filter(p => p.isAI && p.active);
                if (activeAIs.length > 0 && state.active) {
                    const luckyAI = activeAIs[Math.floor(Math.random() * activeAIs.length)];
                    triggerBell(luckyAI.id);
                }
            }, delay);
        }
    }

    function isBellConditionMet() {
        const counts = {};
        state.players.forEach(p => {
            if (p.openCards.length > 0) {
                const top = p.openCards[p.openCards.length - 1];
                counts[top.fruit] = (counts[top.fruit] || 0) + top.count;
            }
        });
        return Object.values(counts).some(c => c === 5);
    }

    function handleBellPress(btn) {
        const pId = parseInt(btn.closest('.p-area').id.split('-')[1]);
        triggerBell(pId);
    }

    function triggerBell(pIdx) {
        if (!state.active) return;
        if (state.aiBellTimer) clearTimeout(state.aiBellTimer);

        const p = state.players[pIdx];
        const correct = isBellConditionMet();

        if (correct) {
            toastMsg(`🔔 P${pIdx+1} 성공!`);
            let allCards = [];
            state.players.forEach(pl => {
                allCards = [...allCards, ...pl.openCards];
                pl.openCards = [];
            });
            p.deck = [...allCards.sort(() => Math.random() - 0.5), ...p.deck];
        } else {
            toastMsg(`❌ P${pIdx+1} 실수!`);
            state.players.forEach(pl => {
                if (pl.id !== pIdx && pl.active && p.deck.length > 0) {
                    pl.deck.unshift(p.deck.pop());
                }
            });
            p.el.classList.add('shake');
            setTimeout(() => p.el.classList.remove('shake'), 300);
        }

        updateView();
        checkGameOver();
    }

    function toastMsg(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 1200);
    }

    function checkGameOver() {
        state.players.forEach(p => {
            if (p.active && p.deck.length === 0 && p.openCards.length === 0) {
                p.active = false;
            }
        });

        const survivors = state.players.filter(p => p.active);
        if (survivors.length === 1) {
            state.active = false;
            const winner = survivors[0];
            document.getElementById('winner-name').innerText = winner.isAI ? `AI ${winner.id}` : `PLAYER ${winner.id + 1}`;
            document.getElementById('win-screen').classList.remove('hidden');
        }
    }

    setMode('ai');
    setCount(2);
    setDiff('easy');
</script>


</body>
</html>
