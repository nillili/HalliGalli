<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>할리갈리 멀티플레이어</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: manipulation;
            user-select: none;
            background-color: #fffbeb; 
            background-image: radial-gradient(#fef3c7 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: #1a1a1a;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            overflow: hidden;
            margin: 0;
            height: 100vh;
        }

        .bg-fruits {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.1;
            font-size: 3rem;
            pointer-events: none;
        }

        .bg-fruit { position: absolute; filter: grayscale(20%); }

        .card-slot {
            aspect-ratio: 2/3;
            width: 18vw;
            max-width: 100px;
            min-width: 60px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1.5px solid rgba(0,0,0,0.05);
        }

        .deck-active {
            cursor: pointer;
            transition: transform 0.1s;
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
        }
        .deck-active:active {
            transform: scale(0.92);
        }

        .bell-btn {
            width: 14vw;
            height: 14vw;
            max-width: 75px;
            max-height: 75px;
            min-width: 55px;
            min-height: 55px;
            background: radial-gradient(circle, #facc15 0%, #ca8a04 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 5px 0 #854d0e;
            cursor: pointer;
            transition: all 0.05s;
            border: 2px solid #a16207;
        }
        .bell-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #854d0e;
        }
        
        .p-area { 
            position: absolute; 
            display: flex; 
            align-items: center; 
            transition: all 0.5s ease-in-out; 
            z-index: 5; 
            opacity: 1;
            transform-origin: center;
        }

        .p-area.removed {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5) !important;
            pointer-events: none;
        }
        
        #area-0 { bottom: 5%; left: 50%; transform: translateX(-50%); flex-direction: column; }
        #area-1 { top: 5%; left: 50%; transform: translateX(-50%) rotate(180deg); flex-direction: column; }
        #area-2 { left: 2%; top: 50%; transform: translateY(-50%) rotate(90deg); flex-direction: column; }
        #area-3 { right: 2%; top: 50%; transform: translateY(-50%) rotate(-90deg); flex-direction: column; }

        .name-label {
            background: rgba(0, 0, 0, 0.75);
            padding: 2px 8px;
            border-radius: 20px;
            color: white !important;
            font-size: 0.7rem;
            margin-bottom: 8px;
            white-space: nowrap;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 900;
            font-size: 1.1rem;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 2px solid #fbbf24;
        }
        
        .fruit-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            padding: 4px;
        }

        .shake {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0) translateX(-50%); }
            20%, 80% { transform: translate3d(2px, 0, 0) translateX(-50%); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0) translateX(-50%); }
            40%, 60% { transform: translate3d(4px, 0, 0) translateX(-50%); }
        }

        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="w-screen relative">

    <div class="bg-fruits">
        <span class="bg-fruit" style="top:10%; left:5%;">🍓</span>
        <span class="bg-fruit" style="top:25%; right:10%;">🍌</span>
        <span class="bg-fruit" style="bottom:15%; left:15%;">🍋</span>
        <span class="bg-fruit" style="bottom:20%; right:5%;">🍇</span>
        <span class="bg-fruit" style="top:50%; left:2%;">🍒</span>
        <span class="bg-fruit" style="top:45%; right:2%;">🍍</span>
    </div>

    <div id="setup-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-4 overflow-y-auto">
        <h1 class="text-5xl md:text-7xl font-black text-red-500 mb-2 tracking-tighter drop-shadow-sm text-center">HALLI GALLI</h1>
        <p class="text-amber-800 mb-6 font-bold text-sm md:text-base">과일이 5개가 되면 종을 치세요!</p>
        
        <div class="w-full max-w-xs md:max-w-sm space-y-5">
            <div>
                <p class="text-amber-900/60 text-[10px] font-bold uppercase mb-2 text-center tracking-widest">게임 모드</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="setMode('ai')" id="mode-ai" class="py-3 rounded-xl border-2 border-red-500 bg-white font-bold text-sm shadow-sm">사람 vs AI</button>
                    <button onclick="setMode('human')" id="mode-human" class="py-3 rounded-xl border-2 border-transparent bg-white/50 font-bold text-sm shadow-sm">사람끼리</button>
                </div>
            </div>

            <div>
                <p class="text-amber-900/60 text-[10px] font-bold uppercase mb-2 text-center tracking-widest">인원수</p>
                <div class="flex justify-between gap-2">
                    <button onclick="setCount(2)" id="cnt-2" class="flex-1 py-3 rounded-xl border-2 border-red-500 bg-white font-bold text-sm shadow-sm">2인</button>
                    <button onclick="setCount(3)" id="cnt-3" class="flex-1 py-3 rounded-xl border-2 border-transparent bg-white/50 font-bold text-sm shadow-sm">3인</button>
                    <button onclick="setCount(4)" id="cnt-4" class="flex-1 py-3 rounded-xl border-2 border-transparent bg-white/50 font-bold text-sm shadow-sm">4인</button>
                </div>
            </div>

            <div id="diff-section">
                <p class="text-amber-900/60 text-[10px] font-bold uppercase mb-2 text-center tracking-widest">AI 난이도</p>
                <div class="flex justify-between gap-2">
                    <button onclick="setDiff('easy')" id="diff-easy" class="flex-1 py-2.5 rounded-lg border-2 border-red-500 bg-white text-xs font-bold shadow-sm">쉬움</button>
                    <button onclick="setDiff('normal')" id="diff-normal" class="flex-1 py-2.5 rounded-lg border-2 border-transparent bg-white/50 text-xs font-bold shadow-sm">보통</button>
                    <button onclick="setDiff('hard')" id="diff-hard" class="flex-1 py-2.5 rounded-lg border-2 border-transparent bg-white/50 text-xs font-bold shadow-sm">어려움</button>
                </div>
            </div>

            <button onclick="startGame()" class="w-full py-4 bg-red-500 text-white font-black text-xl rounded-xl shadow-[0_6px_0_rgb(185,28,28)] active:translate-y-1 active:shadow-none transition-all mt-4">게임 시작!</button>
        </div>
    </div>

    <div id="ingame-controls" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col gap-2 z-20 hidden items-center">
        <div class="flex flex-row gap-2 p-2 bg-white/60 backdrop-blur-md rounded-2xl border border-black/5 shadow-lg">
            <button onclick="restartGame()" class="px-3 py-1.5 bg-white text-zinc-900 rounded-lg font-black text-[10px] uppercase hover:shadow-sm active:scale-95 transition-all">다시 시작</button>
            <button onclick="exitToMenu()" class="px-3 py-1.5 bg-red-600 text-white rounded-lg font-black text-[10px] uppercase hover:bg-red-500 active:scale-95 transition-all">종료</button>
        </div>
    </div>

    <div id="game-board" class="w-full h-full hidden relative overflow-hidden">
        <div id="players-container"></div>
    </div>

    <template id="player-template">
        <div class="p-area">
            <div class="name-label font-black tracking-widest uppercase">PLAYER 1</div>
            <div class="flex items-center gap-2 md:gap-4">
                <div class="deck-btn card-slot">
                    <span class="count-label text-lg md:text-xl font-black italic text-white">0</span>
                </div>
                <div class="open-slot card-slot bg-white invisible">
                    <div class="fruit-grid"></div>
                </div>
                <div class="bell-btn" onclick="handleBellPress(this)">🔔</div>
            </div>
        </div>
    </template>

    <div id="toast" class="toast"></div>

    <div id="win-screen" class="fixed inset-0 bg-white/95 z-[100] hidden flex flex-col items-center justify-center p-8 text-center">
        <div class="text-red-500 text-base md:text-xl font-black tracking-[0.3em] mb-2 uppercase">Winner Winner!</div>
        <h1 id="winner-name" class="text-5xl md:text-7xl font-black mb-10 text-zinc-900 uppercase">PLAYER 1</h1>
        <div class="flex flex-col w-full max-w-xs gap-3">
            <button onclick="restartGame()" class="w-full py-4 bg-red-500 text-white font-black text-lg rounded-xl active:scale-95 transition-all shadow-md">한 판 더!</button>
            <button onclick="exitToMenu()" class="w-full py-4 bg-zinc-800 text-white font-black text-lg rounded-xl active:scale-95 transition-all shadow-md">메인 메뉴</button>
        </div>
    </div>

    <script>
        let currentMode = 'ai';
        let playerCount = 2;
        let aiLevel = 'easy';
        
        let state = {
            active: false,
            turnIdx: 0,
            players: [],
            aiBellTimer: null
        };

        const fruitIcons = ['🍓', '🍌', '🍋', '🍇'];
        const aiSpeeds = { 'easy': [1800, 3500], 'normal': [900, 1800], 'hard': [400, 900] };

        function setMode(m) {
            currentMode = m;
            document.getElementById('mode-ai').className = `py-3 rounded-xl border-2 font-bold transition-all shadow-sm ${m === 'ai' ? 'border-red-500 bg-white' : 'border-transparent bg-white/50'}`;
            document.getElementById('mode-human').className = `py-3 rounded-xl border-2 font-bold transition-all shadow-sm ${m === 'human' ? 'border-red-500 bg-white' : 'border-transparent bg-white/50'}`;
            
            const diffSec = document.getElementById('diff-section');
            diffSec.style.opacity = m === 'ai' ? '1' : '0.2';
            diffSec.style.pointerEvents = m === 'ai' ? 'auto' : 'none';
        }

        function setCount(n) {
            playerCount = n;
            [2, 3, 4].forEach(num => {
                const btn = document.getElementById('cnt-' + num);
                btn.className = `flex-1 py-3 rounded-xl border-2 font-bold shadow-sm ${num === n ? 'border-red-500 bg-white' : 'border-transparent bg-white/50'}`;
            });
        }

        function setDiff(d) {
            aiLevel = d;
            ['easy', 'normal', 'hard'].forEach(lev => {
                const btn = document.getElementById('diff-' + lev);
                btn.className = `flex-1 py-2.5 rounded-lg border-2 text-xs font-bold shadow-sm ${lev === d ? 'border-red-500 bg-white' : 'border-transparent bg-white/50'}`;
            });
        }

        function exitToMenu() {
            location.reload();
        }

        function restartGame() {
            document.getElementById('win-screen').classList.add('hidden');
            startGame();
        }

        function startGame() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-board').classList.remove('hidden');
            document.getElementById('ingame-controls').classList.remove('hidden');
            
            const container = document.getElementById('players-container');
            container.innerHTML = "";
            state.players = [];
            state.active = true;
            state.turnIdx = 0;
            if (state.aiBellTimer) clearTimeout(state.aiBellTimer);

            let deck = [];
            fruitIcons.forEach(icon => {
                [5, 3, 3, 2, 1].forEach((qty, n) => {
                    for(let i=0; i<qty; i++) deck.push({ fruit: icon, count: n + 1 });
                });
            });
            deck = deck.sort(() => Math.random() - 0.5);

            const template = document.getElementById('player-template');
            for(let i=0; i<playerCount; i++) {
                const clone = template.content.cloneNode(true);
                const area = clone.querySelector('.p-area');
                area.id = `area-${i}`;
                
                const isAI = currentMode === 'ai' && i > 0;
                area.querySelector('.name-label').innerText = isAI ? `AI ${i}` : `P${i+1}`;
                
                const player = {
                    id: i,
                    isAI: isAI,
                    deck: [],
                    openCards: [],
                    active: true,
                    el: area
                };

                const deckBtn = area.querySelector('.deck-btn');
                if (!isAI) {
                    deckBtn.classList.add('deck-active');
                    deckBtn.onclick = () => handleFlip(i);
                }

                state.players.push(player);
                container.appendChild(clone);
            }

            let targetP = 0;
            while(deck.length > 0) {
                state.players[targetP % playerCount].deck.push(deck.pop());
                targetP++;
            }

            updateView();
            nextTurn();
        }

        function updateView() {
            state.players.forEach((p, idx) => {
                if (!p.active) return;

                const countLabel = p.el.querySelector('.count-label');
                countLabel.innerText = p.deck.length;
                
                const openSlot = p.el.querySelector('.open-slot');
                const grid = openSlot.querySelector('.fruit-grid');
                
                if (p.openCards.length > 0) {
                    openSlot.classList.remove('invisible');
                    const top = p.openCards[p.openCards.length - 1];
                    grid.innerHTML = "";
                    for(let k=0; k<top.count; k++) {
                        const s = document.createElement('span');
                        s.innerText = top.fruit;
                        s.className = "text-xl md:text-2xl leading-none select-none";
                        grid.appendChild(s);
                    }
                } else {
                    openSlot.classList.add('invisible');
                }

                if (state.active && state.turnIdx === idx) {
                    const baseTransform = (p.id === 0) ? 'translateX(-50%)' : 
                                          (p.id === 1) ? 'translateX(-50%) rotate(180deg)' :
                                          (p.id === 2) ? 'translateY(-50%) rotate(90deg)' :
                                          'translateY(-50%) rotate(-90deg)';
                    p.el.style.transform = `${baseTransform} scale(1.1)`;
                } else {
                    p.el.style.transform = (p.id === 0) ? 'translateX(-50%)' : 
                                          (p.id === 1) ? 'translateX(-50%) rotate(180deg)' :
                                          (p.id === 2) ? 'translateY(-50%) rotate(90deg)' :
                                          'translateY(-50%) rotate(-90deg)';
                }
            });
        }

        function nextTurn() {
            if (!state.active) return;

            // 카드가 있는 다음 플레이어 찾기 (최대 10번 시도하여 무한 루프 방지)
            let count = 0;
            while((!state.players[state.turnIdx].active || state.players[state.turnIdx].deck.length === 0) && count < playerCount * 2) {
                state.turnIdx = (state.turnIdx + 1) % playerCount;
                count++;
            }

            const p = state.players[state.turnIdx];
            if (p && p.isAI && p.active && p.deck.length > 0) {
                setTimeout(() => handleFlip(p.id), 1200);
            }
        }

        function handleFlip(pIdx) {
            if (!state.active || state.turnIdx !== pIdx) return;
            
            const p = state.players[pIdx];
            if (p.deck.length > 0) {
                p.openCards.push(p.deck.pop());
                state.turnIdx = (state.turnIdx + 1) % playerCount;
                updateView();
                checkBellOpportunity();
                checkGameOver();
                nextTurn();
            }
        }

        function checkBellOpportunity() {
            if (state.aiBellTimer) clearTimeout(state.aiBellTimer);
            
            if (isBellConditionMet()) {
                const speed = aiSpeeds[aiLevel];
                const delay = Math.random() * (speed[1] - speed[0]) + speed[0];
                
                state.aiBellTimer = setTimeout(() => {
                    const activeAIs = state.players.filter(p => p.isAI && p.active);
                    if (activeAIs.length > 0 && state.active) {
                        const luckyAI = activeAIs[Math.floor(Math.random() * activeAIs.length)];
                        triggerBell(luckyAI.id);
                    }
                }, delay);
            }
        }

        function isBellConditionMet() {
            const counts = {};
            state.players.forEach(p => {
                if (p.active && p.openCards.length > 0) {
                    const top = p.openCards[p.openCards.length - 1];
                    counts[top.fruit] = (counts[top.fruit] || 0) + top.count;
                }
            });
            return Object.values(counts).some(c => c === 5);
        }

        function handleBellPress(btn) {
            const pId = parseInt(btn.closest('.p-area').id.split('-')[1]);
            triggerBell(pId);
        }

        function triggerBell(pIdx) {
            if (!state.active) return;
            if (state.aiBellTimer) clearTimeout(state.aiBellTimer);

            const p = state.players[pIdx];
            const correct = isBellConditionMet();

            if (correct) {
                toastMsg(`🔔 P${pIdx+1} SUCCESS!`);
                let allCards = [];
                state.players.forEach(pl => {
                    allCards = [...allCards, ...pl.openCards];
                    pl.openCards = [];
                });
                p.deck = [...allCards.sort(() => Math.random() - 0.5), ...p.deck];
            } else {
                toastMsg(`❌ P${pIdx+1} MISTAKE!`);
                state.players.forEach(pl => {
                    if (pl.id !== pIdx && pl.active && p.deck.length > 0) {
                        pl.deck.unshift(p.deck.pop());
                    }
                });
                p.el.classList.add('shake');
                setTimeout(() => p.el.classList.remove('shake'), 300);
            }

            updateView();
            checkGameOver();
        }

        function toastMsg(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1200);
        }

        function checkGameOver() {
            state.players.forEach(p => {
                // 플레이어가 덱과 오픈된 카드를 모두 잃으면 아웃
                if (p.active && p.deck.length === 0 && p.openCards.length === 0) {
                    p.active = false;
                    p.el.classList.add('removed');
                    toastMsg(`👋 P${p.id+1} OUT!`);
                }
            });

            const survivors = state.players.filter(p => p.active);
            
            // 2명일 때 한 명이 아웃되거나, 최종적으로 1명만 남으면 게임 종료
            if (survivors.length === 1) {
                state.active = false;
                const winner = survivors[0];
                document.getElementById('winner-name').innerText = winner.isAI ? `AI ${winner.id}` : `PLAYER ${winner.id + 1}`;
                document.getElementById('win-screen').classList.remove('hidden');
            }
        }

        setMode('ai');
        setCount(2);
        setDiff('easy');
    </script>
</body>
</html>
